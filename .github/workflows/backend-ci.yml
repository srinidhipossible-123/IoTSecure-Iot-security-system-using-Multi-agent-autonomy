name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'iotsecure/agents/**'
      - 'iotsecure/honeypot/**'
      - 'iotsecure/orchestrator/**'
      - 'iotsecure/security/**'
      - 'iotsecure/store/**'
      - 'iotsecure/tools/**'
      - 'iotsecure/webhook/**'
      - 'iotsecure/*.py'
      - 'iotsecure/requirements.txt'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'iotsecure/agents/**'
      - 'iotsecure/honeypot/**'
      - 'iotsecure/orchestrator/**'
      - 'iotsecure/security/**'
      - 'iotsecure/store/**'
      - 'iotsecure/tools/**'
      - 'iotsecure/webhook/**'
      - 'iotsecure/*.py'
      - 'iotsecure/requirements.txt'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: 'iotsecure/requirements.txt'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r iotsecure/requirements.txt
        pip install pytest pytest-cov pytest-asyncio black flake8 isort
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 iotsecure --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=dashboard
        # Exit-zero treats all errors as warnings
        flake8 iotsecure --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=dashboard
    
    - name: Format check with black
      run: |
        black --check iotsecure --exclude=dashboard --diff || true
    
    - name: Import sorting check with isort
      run: |
        isort --check-only iotsecure --skip-glob=dashboard/* --diff || true
    
    - name: Run tests
      run: |
        cd iotsecure
        pytest . --cov=. --cov-report=xml --cov-report=term-missing
      continue-on-error: true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./iotsecure/coverage.xml
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}
      continue-on-error: true

  security-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run Bandit security scan
      run: |
        bandit -r iotsecure -x ./iotsecure/dashboard -f json -o bandit-report.json || true
    
    - name: Check for vulnerable dependencies
      run: |
        safety check --requirements iotsecure/requirements.txt || true
