name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Validate environment variables
      run: |
        echo "Deployment environment: ${{ github.event.inputs.environment || 'staging' }}"
        echo "Event: ${{ github.event_name }}"
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r iotsecure/requirements.txt
    
    - name: Install Node dependencies
      run: |
        cd iotsecure/dashboard
        npm ci
    
    - name: Build dashboard
      run: |
        cd iotsecure/dashboard
        npm run build
    
    - name: Run pre-deployment checks
      run: |
        echo "Running pre-deployment validation..."
        python -c "
        import os
        import sys
        required_files = [
            'iotsecure/main.py',
            'iotsecure/requirements.txt',
            'iotsecure/config.py',
        ]
        missing = [f for f in required_files if not os.path.exists(f)]
        if missing:
            print(f'Missing required files: {missing}')
            sys.exit(1)
        print('✓ All pre-deployment checks passed')
        "
    
    - name: Create deployment artifact
      run: |
        mkdir -p deployment
        cp -r iotsecure deployment/
        cp -r iotsecure/dashboard/dist deployment/dashboard-dist || true
        tar -czf deployment.tar.gz deployment/
        echo "Artifact size: $(du -h deployment.tar.gz | cut -f1)"
    
    - name: Upload deployment artifact
      uses: actions/upload-artifact@v3
      with:
        name: deployment-${{ github.run_id }}
        path: deployment.tar.gz
        retention-days: 30
    
    - name: Notify deployment
      if: success()
      run: |
        echo "✓ Deployment artifact created successfully"
        echo "Environment: ${{ github.event.inputs.environment || 'staging' }}"
        echo "Artifact: deployment-${{ github.run_id }}"
