name: Full Stack CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
      continue-on-error: true
    
    - name: Validate file structure
      run: |
        echo "Checking project structure..."
        [ -f "requirements.txt" ] && echo "✓ requirements.txt found"
        [ -d "dashboard" ] && echo "✓ dashboard directory found"
        [ -f "dashboard/package.json" ] && echo "✓ package.json found"
        [ -f "main.py" ] && echo "✓ main.py found"
        [ -d "agents" ] && echo "✓ agents directory found"

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Python tools
      run: |
        python -m pip install --upgrade pip
        pip install pylint mypy black isort
    
    - name: Type checking with mypy
      run: |
        mypy . --ignore-missing-imports --exclude dashboard || true
    
    - name: Code complexity analysis
      run: |
        pip install radon
        radon cc . -a -x "dashboard/*" || true
        radon mi . -x "dashboard/*" || true

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Check Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit
        pip-audit --desc || true
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Check npm dependencies
      run: |
        cd dashboard
        npm audit || true
